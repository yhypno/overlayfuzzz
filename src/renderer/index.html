<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>OverlayFuzz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-state="idle">
    <div class="scene">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <div class="ambient ambient-c"></div>
      <div class="overlay">
        <section class="panel">
          <div class="panel__header">
            <div>
              <div class="eyebrow">OverlayFuzz</div>
              <h1 class="title">OCR capture console</h1>
            </div>
            <div class="state-pill" id="statePill">Idle</div>
          </div>
          <div class="status" id="status">Press Ctrl/Cmd + Shift + O to open, then Ctrl/Cmd + Shift + 1 to capture.</div>
          <div class="captures">
            <div class="captures__strip" id="captureStrip" hidden></div>
            <div class="captures__empty" id="captureEmpty">No screenshots yet.</div>
          </div>
          <div class="result-card">
            <div class="card-label">Detected text</div>
            <pre class="result" id="result">Waiting for OCR...</pre>
            <div class="scanline"></div>
          </div>
          <div class="metrics">
            <div class="metric">
              <div class="metric__label">Confidence</div>
              <div class="metric__value" id="confidenceValue">--</div>
              <div class="meter" aria-hidden="true"><span id="confidenceBar"></span></div>
            </div>
            <div class="metric">
              <div class="metric__label">Error</div>
              <div class="metric__value metric__value--small" id="errorValue">No errors reported.</div>
            </div>
          </div>
          <div class="footer">
            <div id="meta">Bridge ready</div>
            <div class="hotkey-group">
              <div class="hotkey" id="quickHotkey">Open: Ctrl/Cmd + Shift + O</div>
              <div class="hotkey" id="regionHotkey">Capture: Ctrl/Cmd + Shift + 1</div>
            </div>
          </div>
        </section>
      </div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
